<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Híbrido">
<meta name="theme-color" content="#0f0e17">
<title>Híbrido — Tu Plan</title>
<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<!-- ICONOS -->
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg: #0f0e17; --bg2: #1a1927; --bg3: #22203a;
  --border: rgba(255,255,255,0.08); --text: #f0eeff;
  --muted: rgba(240,238,255,0.45); --accent: #7c6ff7;
  --accent2: #a594f9; --green: #3ecf8e;
  --radius: 14px; --font: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
  --push: #7c6ff7; --pull: #3ecf8e; --cardio: #38bdf8; --full: #f4a738;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #0f0e17; font-family: var(--font); color: var(--text); }

.app { display: flex; flex-direction: column; height: 100dvh; }
.screen { flex: 1; overflow-y: auto; padding: 16px 16px 90px; display: none; }
.screen.active { display: block; }

/* NAV */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 8px; cursor: pointer; border: none; background: none; color: var(--muted); font-size: 10px; font-weight: 600; text-transform: uppercase; }
.nav-btn.active { color: var(--accent2); }
.nav-btn svg { width: 22px; height: 22px; }

/* CARDS */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.card-sm { background: var(--bg3); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.home-hero { background: linear-gradient(135deg, rgba(124,111,247,0.3) 0%, rgba(62,207,142,0.15) 100%); border: 1px solid rgba(124,111,247,0.3); border-radius: 18px; padding: 24px; margin-bottom: 14px; }

/* UI ELEMENTS */
.chip { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; margin-bottom: 8px; }
.chip-push { background: rgba(124,111,247,0.18); color: var(--push); }
.chip-pull { background: rgba(62,207,142,0.18); color: var(--pull); }
.chip-cardio { background: rgba(56,189,248,0.15); color: var(--cardio); }
.chip-full { background: rgba(244,167,56,0.18); color: var(--full); }

.tabs { display: flex; gap: 5px; margin-bottom: 14px; }
.tab { font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
.tab.active { background: var(--accent); color: white; }

.btn { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; font-weight: 700; padding: 12px; border-radius: 999px; border: none; background: var(--accent); color: white; cursor: pointer; width: 100%; }
.btn-green { background: var(--green); color: #0a2318; }

input, select { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; width: 100%; margin-top: 5px; font-family: var(--font); }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--green); color: #0a2318; font-weight: 700; padding: 8px 20px; border-radius: 999px; opacity: 0; transition: 0.3s; z-index: 1000; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <!-- PANTALLAS -->
  <div id="s-home" class="screen active">
    <div class="home-hero">
      <h1 style="font-size: 28px; font-weight: 800;">Híbrido</h1>
      <p style="font-size: 13px; color: var(--muted); margin: 8px 0 16px;">Tu sistema de alto rendimiento.</p>
      <button class="btn btn-green" onclick="exportarParaIA()">✨ Copiar datos para mi Profesora IA</button>
    </div>
    <div id="home-content"></div>
  </div>

  <div id="s-plan" class="screen">
    <h2 style="margin-bottom:15px;">Plan Semanal</h2>
    <div id="plan-list"></div>
  </div>

  <div id="s-registro" class="screen">
    <h2 style="margin-bottom:15px;">Registro de Sesión</h2>
    <div id="registro-ui"></div>
  </div>

  <div id="s-nutri" class="screen">
    <h2 style="margin-bottom:15px;">Nutrición</h2>
    <div class="tabs">
      <button class="tab active" onclick="renderNutri('fuerza', this)">Fuerza</button>
      <button class="tab" onclick="renderNutri('cardio', this)">Cardio</button>
      <button class="tab" onclick="renderNutri('descanso', this)">Descanso</button>
    </div>
    <div id="nutri-list"></div>
  </div>

  <!-- NAVEGACIÓN -->
  <nav class="nav">
    <button class="nav-btn active" onclick="goTo('home',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg>
      Inicio
    </button>
    <button class="nav-btn" onclick="goTo('plan',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/></svg>
      Plan
    </button>
    <button class="nav-btn" onclick="goTo('registro',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2v-4"/></svg>
      Registro
    </button>
    <button class="nav-btn" onclick="goTo('nutri',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a7 7 0 017 7c0 4-3 7-7 10"/></svg>
      Nutri
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── TUS DATOS REALES ────────────────────────────────────────────────────────
const DAYS = [
  { id:'lun', label:'Lunes', chipClass:'chip-push', type:'Torso A — Empuje', exercises:[
    {name:'Dips pecho (inclinado)', series:4}, {name:'Dips tríceps (vertical)', series:4}, {name:'Pike push-up', series:4}, {name:'Flexiones arquero', series:3}
  ]},
  { id:'mar', label:'Martes', chipClass:'chip-cardio', type:'Cardio — Zona 2', desc:'35 min · 72-82% FC (Ritmo suave)'},
  { id:'mie', label:'Miércoles', chipClass:'chip-pull', type:'Torso B — Tracción', exercises:[
    {name:'Dominadas pronadas', series:4}, {name:'Chin-up supino', series:3}, {name:'Remo invertido', series:4}, {name:'Elevación de piernas', series:3}
  ]},
  { id:'jue', label:'Jueves', chipClass:'chip-cardio', type:'Cardio — HIIT', desc:'Intervalos · 30" máx / 60" suave'},
  { id:'vie', label:'Viernes', chipClass:'chip-full', type:'Full Body + Pierna', exercises:[
    {name:'Sentadilla búlgara', series:4}, {name:'Hip thrust suelo', series:4}, {name:'Zancada lateral', series:3}, {name:'Dominadas (mant.)', series:3}
  ]}
];

const MEALS = {
  fuerza: [
    {name:'Desayuno', items:'Avena 80g + 3 Huevos + Plátano', kcal:620},
    {name:'Comida', items:'Arroz 150g + Pollo 200g + Verduras', kcal:620},
    {name:'Cena', items:'Salmón 180g + Boniato 200g', kcal:570}
  ],
  cardio: [{name:'Desayuno', items:'Avena 60g + 2 Huevos', kcal:520}],
  descanso: [{name:'Comida', items:'Salmón + Arroz 100g + Verduras', kcal:580}]
};

const TIPS = [
  {icon:'🥩', title:'Proteína', text:'Distribuye 160g en 4-5 tomas diarias.'},
  {icon:'💧', title:'Agua', text:'Bebe 3L al día. En Suiza el clima seco lo requiere.'}
];

// ─── LÓGICA DE LA APP ────────────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('hibrido_save')) || { registro: {} };

function goTo(screenId, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + screenId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if(screenId === 'home') renderHome();
  if(screenId === 'plan') renderPlan();
  if(screenId === 'registro') renderRegistro();
  if(screenId === 'nutri') renderNutri('fuerza');
}

function renderHome() {
  document.getElementById('home-content').innerHTML = `
    <h2 style="margin-bottom:10px;">Tips de Hoy</h2>
    ${TIPS.map(t => `<div class="card-sm" style="display:flex; gap:12px;"><span>${t.icon}</span><div><strong>${t.title}</strong><p style="font-size:12px; color:var(--muted);">${t.text}</p></div></div>`).join('')}
  `;
}

function renderPlan() {
  document.getElementById('plan-list').innerHTML = DAYS.map(d => `
    <div class="card">
      <span class="chip ${d.chipClass}">${d.label}</span>
      <h3>${d.type}</h3>
      <p style="font-size:12px; color:var(--muted); margin-top:4px;">${d.desc || d.exercises.length + ' ejercicios'}</p>
    </div>
  `).join('');
}

function renderRegistro() {
  document.getElementById('registro-ui').innerHTML = `
    <div class="card">
      <label class="label">Selecciona el día</label>
      <select id="reg-day" onchange="updateRegFields()">
        ${DAYS.map(d => `<option value="${d.id}">${d.label} - ${d.type}</option>`).join('')}
      </select>
      <div id="fields-area" style="margin-top:20px;"></div>
      <button class="btn" style="margin-top:20px;" onclick="saveEntry()">Guardar entrenamiento</button>
    </div>
  `;
  updateRegFields();
}

function updateRegFields() {
  const dayId = document.getElementById('reg-day').value;
  const day = DAYS.find(d => d.id === dayId);
  const area = document.getElementById('fields-area');

  if(day.exercises) {
    area.innerHTML = day.exercises.map(ex => `
      <div style="margin-bottom:15px;">
        <p style="font-size:13px; font-weight:700;">${ex.name}</p>
        <input type="text" id="in-${ex.name.replace(/ /g,'')}" placeholder="${ex.series} series (ej: 10/10/8/8)">
      </div>
    `).join('');
  } else {
    area.innerHTML = `<p style="font-size:13px; color:var(--accent2);">${day.desc}</p><input type="text" id="in-cardio" placeholder="Resultado (tiempo, pulsaciones...)">`;
  }
}

function saveEntry() {
  const dayId = document.getElementById('reg-day').value;
  const day = DAYS.find(d => d.id === dayId);
  const entry = { date: new Date().toLocaleDateString(), data: {} };

  if(day.exercises) {
    day.exercises.forEach(ex => {
      entry.data[ex.name] = document.getElementById(`in-${ex.name.replace(/ /g,'')}`).value;
    });
  } else {
    entry.data['Resumen'] = document.getElementById('in-cardio').value;
  }

  if(!state.registro[dayId]) state.registro[dayId] = [];
  state.registro[dayId].push(entry);
  localStorage.setItem('hibrido_save', JSON.stringify(state));
  showToast("✓ Guardado en tu móvil");
}

function renderNutri(type, btn) {
  if(btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }
  document.getElementById('nutri-list').innerHTML = MEALS[type].map(m => `
    <div class="meal-card" style="background:var(--bg3); padding:15px; border-radius:10px; margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
        <h3 style="font-size:15px;">${m.name}</h3>
        <span style="color:var(--accent2); font-weight:bold; font-family:var(--mono);">${m.kcal} kcal</span>
      </div>
      <p style="font-size:13px; color:var(--muted);">${m.items}</p>
    </div>
  `).join('');
}

function exportarParaIA() {
  let texto = "PROFESORA IA - REPORTE ALBERTO:\n\n";
  let hayDatos = false;
  
  Object.keys(state.registro).forEach(id => {
    state.registro[id].forEach(e => {
      hayDatos = true;
      texto += `📅 ${e.date} | ${id.toUpperCase()}\n`;
      Object.entries(e.data).forEach(([k,v]) => texto += `  - ${k}: ${v}\n`);
    });
  });

  if(!hayDatos) { alert("No hay entrenos registrados aún."); return; }

  navigator.clipboard.writeText(texto).then(() => showToast("✨ Datos listos para pegar en la IA"));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.onload = renderHome;
</script>
</body>
</html>
