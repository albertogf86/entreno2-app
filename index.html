<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Híbrido">
<meta name="theme-color" content="#0f0e17">
<title>Híbrido — Tu Plan</title>
<!-- PWA -->
<link rel="manifest" href="./manifest.json">

<!-- ICONOS -->
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg: #0f0e17;
  --bg2: #1a1927;
  --bg3: #22203a;
  --border: rgba(255,255,255,0.08);
  --text: #f0eeff;
  --muted: rgba(240,238,255,0.45);
  --accent: #7c6ff7;
  --accent2: #a594f9;
  --green: #3ecf8e;
  --amber: #f4a738;
  --red: #f07167;
  --push: #7c6ff7;
  --pull: #3ecf8e;
  --cardio: #38bdf8;
  --full: #f4a738;
  --radius: 14px;
  --font: 'Syne', sans-serif;
  --mono: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  min-height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: manipulation;
  background: #0f0e17;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; }

/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100dvh; }
.screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 16px 90px; display: none; }
.screen.active { display: block; }

/* NAV */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 8px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: var(--font); font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s; }
.nav-btn.active { color: var(--accent2); }
.nav-btn svg { width: 22px; height: 22px; }

/* CARDS & COMPONENTS */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.card-sm { background: var(--bg3); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 12px; }
.chip { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; letter-spacing: 0.03em; margin-bottom: 4px; }
.chip-push { background: rgba(124,111,247,0.18); color: var(--push); }
.chip-pull { background: rgba(62,207,142,0.18); color: var(--pull); }
.chip-cardio { background: rgba(56,189,248,0.15); color: var(--cardio); }
.chip-full { background: rgba(244,167,56,0.18); color: var(--full); }

.tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
.tab { font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: var(--font); }
.tab.active { background: var(--accent); color: white; border-color: var(--accent); }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; font-weight: 700; padding: 10px 20px; border-radius: 999px; border: none; background: var(--accent); color: white; cursor: pointer; font-family: var(--font); width: 100%; }
.btn-green { background: var(--green); color: #0a2318; }

.meal-card { background: var(--bg3); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.meal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.meal-kcal { font-size: 12px; background: rgba(124,111,247,0.2); color: var(--accent2); padding: 2px 9px; border-radius: 999px; font-weight: 700; font-family: var(--mono); }

.home-hero { background: linear-gradient(135deg, rgba(124,111,247,0.3) 0%, rgba(62,207,142,0.15) 100%); border: 1px solid rgba(124,111,247,0.3); border-radius: 18px; padding: 24px; margin-bottom: 14px; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--green); color: #0a2318; font-weight: 700; font-size: 13px; padding: 8px 20px; border-radius: 999px; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <!-- SCREENS -->
  <div id="s-home" class="screen active">
    <div class="home-hero">
      <h1 style="margin-bottom: 4px;">Híbrido</h1>
      <p style="font-size: 13px; color: var(--muted); margin-bottom: 16px;">Tu ecosistema de alto rendimiento.</p>
      <button class="btn btn-green" onclick="exportarParaIA()">✨ Copiar para mi Profesora IA</button>
    </div>
    <div id="home-content"></div>
  </div>

  <div id="s-plan" class="screen">
    <h2>Mi Plan Semanal</h2>
    <div id="plan-list"></div>
  </div>

  <div id="s-registro" class="screen">
    <h2>Registro Diario</h2>
    <div id="registro-content"></div>
  </div>

  <div id="s-nutri" class="screen">
    <h2>Nutrición y Macros</h2>
    <div class="tabs">
      <button class="tab active" onclick="setNutriTab('fuerza', this)">Fuerza</button>
      <button class="tab" onclick="setNutriTab('cardio', this)">Cardio</button>
      <button class="tab" onclick="setNutriTab('descanso', this)">Descanso</button>
    </div>
    <div id="nutri-content"></div>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn active" onclick="goTo('home',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      Inicio
    </button>
    <button class="nav-btn" onclick="goTo('plan',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      Plan
    </button>
    <button class="nav-btn" onclick="goTo('registro',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2v-4"/><path d="M15 3h6v6"/><path d="M21 3l-9 9"/></svg>
      Registro
    </button>
    <button class="nav-btn" onclick="goTo('nutri',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a7 7 0 017 7c0 4-3 7-7 10C9 16 5 13 5 9a7 7 0 017-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      Nutri
    </button>
  </nav>
</div>

<div class="toast" id="toast">✓ Copiado al portapapeles</div>

<script>
// ─── DATA & STATE ────────────────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('hibrido_data')) || {
  registro: {} // Aquí se guardarán tus marcas de entreno
};

const DAYS = [
  { id:'lun', label:'Lunes', chipClass:'chip-push', type:'Torso A — Empuje', exercises:[
    {name:'Dips pecho', series:4}, {name:'Dips tríceps', series:4}, {name:'Pike push-up', series:4}
  ]},
  { id:'mar', label:'Martes', chipClass:'chip-cardio', type:'Cardio — Zona 2', desc:'35 min carrera/bici'},
  { id:'mie', label:'Miércoles', chipClass:'chip-pull', type:'Torso B — Tracción', exercises:[
    {name:'Dominadas', series:4}, {name:'Chin-up', series:3}, {name:'Remo invertido', series:4}
  ]},
  { id:'jue', label:'Jueves', chipClass:'chip-cardio', type:'Cardio — HIIT', desc:'Intervalos alta intensidad'},
  { id:'vie', label:'Viernes', chipClass:'chip-full', type:'Full Body + Pierna', exercises:[
    {name:'Sentadilla búlgara', series:4}, {name:'Hip Thrust', series:4}, {name:'Zancada lateral', series:3}
  ]}
];

const MEALS = {
  fuerza: [
    {time:'07:00', name:'Desayuno', items:'Avena + 3 Huevos + Plátano', kcal:620},
    {time:'13:30', name:'Comida', items:'Arroz + Pollo + Verduras', kcal:620}
  ],
  cardio: [
    {time:'07:00', name:'Desayuno', items:'Avena + 2 Huevos + Fruta', kcal:520},
    {time:'13:30', name:'Comida', items:'Patata + Ternera + Verduras', kcal:580}
  ],
  descanso: [
    {time:'08:00', name:'Desayuno', items:'3 Huevos + Aguacate', kcal:450}
  ]
};

// ─── NAVIGATION & RENDER ─────────────────────────────────────────────────────
function goTo(screenId, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + screenId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  if(screenId === 'plan') renderPlan();
  if(screenId === 'nutri') renderNutri('fuerza');
  if(screenId === 'registro') renderRegistro();
}

function renderPlan() {
  const container = document.getElementById('plan-list');
  container.innerHTML = DAYS.map(day => `
    <div class="card">
      <span class="chip ${day.chipClass}">${day.label}</span>
      <h3 style="margin-top:5px;">${day.type}</h3>
      <p style="font-size:12px; color:var(--muted);">${day.desc || 'Entrenamiento de fuerza'}</p>
    </div>
  `).join('');
}

function renderNutri(type) {
  const container = document.getElementById('nutri-content');
  const meals = MEALS[type];
  container.innerHTML = meals.map(m => `
    <div class="meal-card">
      <div class="meal-header">
        <div>
          <span class="label" style="font-size:9px; color:var(--muted);">${m.time}</span>
          <h3 style="font-size:14px;">${m.name}</h3>
        </div>
        <span class="meal-kcal">${m.kcal} kcal</span>
      </div>
      <p class="meal-items">${m.items}</p>
    </div>
  `).join('');
}

function renderRegistro() {
  const container = document.getElementById('registro-content');
  container.innerHTML = `
    <div class="card">
      <p style="font-size:13px; color:var(--muted); margin-bottom:10px;">Selecciona el día para registrar tus marcas:</p>
      <select id="day-select" onchange="updateRegFields()" style="width:100%; padding:10px; background:var(--bg3); color:white; border:none; border-radius:8px;">
        ${DAYS.map(d => `<option value="${d.id}">${d.label} - ${d.type}</option>`).join('')}
      </select>
      <div id="reg-fields" style="margin-top:15px;"></div>
      <button class="btn" onclick="saveReg()" style="margin-top:15px;">Guardar sesión</button>
    </div>
  `;
  updateRegFields();
}

function updateRegFields() {
  const dayId = document.getElementById('day-select').value;
  const day = DAYS.find(d => d.id === dayId);
  const container = document.getElementById('reg-fields');
  
  if(day.exercises) {
    container.innerHTML = day.exercises.map(ex => `
      <div style="margin-bottom:12px;">
        <label style="font-size:12px; font-weight:bold;">${ex.name} (${ex.series} series)</label>
        <input type="text" placeholder="Ej: 10/10/8/8 reps" id="input-${dayId}-${ex.name.replace(/ /g,'')}" 
               style="width:100%; padding:8px; margin-top:5px; background:var(--bg2); border:1px solid var(--border); color:white; border-radius:5px;">
      </div>
    `).join('');
  } else {
    container.innerHTML = `<p style="font-size:12px; color:var(--accent2);">${day.desc}</p>
    <input type="text" placeholder="Notas del cardio..." id="input-${dayId}-cardio" style="width:100%; padding:8px; margin-top:5px; background:var(--bg2); border:1px solid var(--border); color:white; border-radius:5px;">`;
  }
}

// ─── LOGIC & STORAGE ─────────────────────────────────────────────────────────
function saveReg() {
  const dayId = document.getElementById('day-select').value;
  const day = DAYS.find(d => d.id === dayId);
  
  if(!state.registro[dayId]) state.registro[dayId] = [];
  
  const entry = { date: new Date().toLocaleDateString(), data: {} };
  
  if(day.exercises) {
    day.exercises.forEach(ex => {
      const val = document.getElementById(`input-${dayId}-${ex.name.replace(/ /g,'')}`).value;
      entry.data[ex.name] = val;
    });
  } else {
    entry.data['cardio'] = document.getElementById(`input-${dayId}-cardio`).value;
  }
  
  state.registro[dayId].push(entry);
  localStorage.setItem('hibrido_data', JSON.stringify(state));
  showToast("✓ Sesión guardada en el dispositivo");
}

function exportarParaIA() {
  let texto = "Hola Profesora IA, aquí tienes mi progreso en Híbrido:\n\n";
  
  Object.keys(state.registro).forEach(dayId => {
    const day = DAYS.find(d => d.id === dayId);
    state.registro[dayId].forEach(entry => {
      texto += `📅 Fecha: ${entry.date} | Día: ${day.label}\n`;
      Object.entries(entry.data).forEach(([key, val]) => {
        texto += `   - ${key}: ${val}\n`;
      });
      texto += "\n";
    });
  });

  if(texto.length < 100) {
    alert("No hay datos registrados todavía.");
    return;
  }

  navigator.clipboard.writeText(texto).then(() => {
    showToast("✓ Datos copiados para Gemini");
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function setNutriTab(type, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderNutri(type);
}

// Inicializar
window.onload = () => {
  console.log("Híbrido cargado.");
};
</script>
</body>
</html>
